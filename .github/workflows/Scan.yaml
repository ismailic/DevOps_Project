name: "Terraform-CI"

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login l Azure (Hna kankhdmo b l-User dyal l-lab)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_USER_NAME }}",
              "clientSecret": "${{ secrets.AZURE_PASSWORD }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 2. Security Audit (Checkov)
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform

      # 3. Terraform Init & Plan
      - name: Terraform Init
        run: terraform init
        env:
          ARM_USE_CLI: true  # <--- Hada hwa l-muftā7

      - name: Terraform Plan
        run: terraform plan
        env:
          ARM_USE_CLI: true  # <--- Hada hwa l-muftā7